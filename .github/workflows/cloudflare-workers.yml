name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target env"
        required: true
        default: "a"
        type: choice
        options:
          - a
          - b
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-a:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.target == 'a'
    env:
      DEPLOY_ENV: a
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_A }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_A }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: worker
        run: npm install --no-audit --no-fund

      - name: Typecheck
        working-directory: worker
        run: npm run typecheck

      - name: Validate A secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN_A" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID_A" && exit 1)

      - name: Apply D1 migrations (env a)
        working-directory: worker
        run: npx wrangler d1 migrations apply DB --remote --env a

      - name: Deploy Worker (env a)
        working-directory: worker
        run: npx wrangler deploy --env a

  deploy-b:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'b'
    env:
      DEPLOY_ENV: b
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_B }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_B }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: worker
        run: npm install --no-audit --no-fund

      - name: Typecheck
        working-directory: worker
        run: npm run typecheck

      - name: Validate B secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN_B" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID_B" && exit 1)

      - name: Apply D1 migrations (env b)
        working-directory: worker
        run: npx wrangler d1 migrations apply DB --remote --env b

      - name: Deploy Worker (env b)
        working-directory: worker
        run: npx wrangler deploy --env b
