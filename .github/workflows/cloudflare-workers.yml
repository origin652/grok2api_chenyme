name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target env"
        required: true
        default: "a"
        type: choice
        options:
          - a
          - b

permissions:
  contents: read

jobs:
  deploy-a:
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'a'
    env:
      TARGET_ENV: a
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_A }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_A }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: worker
        run: npm install --no-audit --no-fund

      - name: Typecheck
        working-directory: worker
        run: npm run typecheck

      - name: Validate A secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN_A" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID_A" && exit 1)

      - name: Prepare wrangler.ci.toml (auto ensure D1/KV for env a)
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request

          token = os.environ.get("CLOUDFLARE_API_TOKEN", "")
          account_id = os.environ.get("CLOUDFLARE_ACCOUNT_ID", "")
          target = os.environ.get("TARGET_ENV", "a").strip()
          build_sha = os.environ.get("GITHUB_SHA", "")
          if not token or not account_id:
              raise SystemExit("Missing CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID")

          src_path = "worker/wrangler.toml"
          dst_path = "worker/wrangler.ci.toml"
          text = open(src_path, "r", encoding="utf-8").read()

          def extract(pattern: str, fallback: str) -> str:
              m = re.search(pattern, text)
              return m.group(1).strip() if m and m.group(1).strip() else fallback

          worker_name = extract(
              rf'(?ms)\[env\.{target}\]\s*name\s*=\s*"([^"]+)"',
              f"grok2api-{target}",
          )
          d1_name = extract(
              rf'(?ms)\[\[env\.{target}\.d1_databases\]\].*?^\s*database_name\s*=\s*"([^"]+)"',
              f"grok2api_{target}",
          )
          kv_title = f"{worker_name}-cache"

          def request(method: str, url: str, data=None):
              headers = {
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              }
              body = None if data is None else json.dumps(data).encode("utf-8")
              req = urllib.request.Request(url, data=body, headers=headers, method=method)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          # Ensure KV namespace
          kv_base = f"https://api.cloudflare.com/client/v4/accounts/{account_id}/storage/kv/namespaces"
          kv_id = None
          page = 1
          while True:
              res = request("GET", f"{kv_base}?per_page=100&page={page}")
              if not res.get("success"):
                  raise RuntimeError(res)
              for item in res.get("result", []):
                  if item.get("title") == kv_title:
                      kv_id = item.get("id")
                      break
              if kv_id:
                  break
              info = res.get("result_info") or {}
              if page >= int(info.get("total_pages") or 1):
                  break
              page += 1
          if not kv_id:
              res = request("POST", kv_base, {"title": kv_title})
              if not res.get("success"):
                  raise RuntimeError(res)
              kv_id = res["result"]["id"]

          # Ensure D1 database
          d1_base = f"https://api.cloudflare.com/client/v4/accounts/{account_id}/d1/database"
          d1_id = None
          page = 1
          while True:
              res = request("GET", f"{d1_base}?per_page=100&page={page}")
              if not res.get("success"):
                  raise RuntimeError(res)
              for item in res.get("result", []):
                  if item.get("name") == d1_name:
                      d1_id = item.get("uuid") or item.get("id")
                      break
              if d1_id:
                  break
              info = res.get("result_info") or {}
              if page >= int(info.get("total_pages") or 1):
                  break
              page += 1
          if not d1_id:
              res = request("POST", d1_base, {"name": d1_name})
              if not res.get("success"):
                  raise RuntimeError(res)
              d1_id = res.get("result", {}).get("uuid") or res.get("result", {}).get("id")

          text2 = text
          text2 = re.sub(
              rf'(?ms)(\[\[env\.{target}\.d1_databases\]\].*?^\s*database_id\s*=\s*")[^"]*("\s*)$',
              lambda m: f"{m.group(1)}{d1_id}{m.group(2)}",
              text2,
          )
          text2 = re.sub(
              rf'(?ms)(\[\[env\.{target}\.kv_namespaces\]\].*?^\s*id\s*=\s*")[^"]*("\s*)$',
              lambda m: f"{m.group(1)}{kv_id}{m.group(2)}",
              text2,
          )
          if build_sha:
              text2 = re.sub(
                  rf'(?ms)(\[env\.{target}\.vars\].*?^\s*BUILD_SHA\s*=\s*")[^"]*("\s*)$',
                  lambda m: f"{m.group(1)}{build_sha}{m.group(2)}",
                  text2,
              )

          open(dst_path, "w", encoding="utf-8").write(text2)
          print(f"env={target} KV ready: {kv_title} ({kv_id})")
          print(f"env={target} D1 ready: {d1_name} ({d1_id})")
          print(f"Generated {dst_path}")
          PY

      - name: Apply D1 migrations (env a)
        working-directory: worker
        run: npx wrangler d1 migrations apply DB --remote --env a --config wrangler.ci.toml

      - name: Deploy Worker (env a)
        working-directory: worker
        run: npx wrangler deploy --env a --config wrangler.ci.toml

  deploy-b:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'b'
    env:
      TARGET_ENV: b
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_B }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_B }}
