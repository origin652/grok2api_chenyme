name = "grok2api"
main = "src/index.ts"
compatibility_date = "2026-01-28"

# Static assets (admin UI)
assets = { directory = "./static", binding = "ASSETS" }

# Hard-pin execution closer to the US to make egress locality more stable.
# Docs: https://developers.cloudflare.com/workers/platform/placement/
[placement]
region = "aws:us-east-1"

# Root-level bindings intentionally omitted.
# Use env.a / env.b for hard isolation (separate D1/KV/account).

# Durable Objects migrations history:
# - do-v1 created AutoRegisterJob (now removed)
# - do-v2 deletes it so the Worker can deploy without exporting the class
[[migrations]]
tag = "do-v1"
new_sqlite_classes = ["AutoRegisterJob"]

[[migrations]]
tag = "do-v2"
deleted_classes = ["AutoRegisterJob"]

# NOTE: vars are environment-scoped when using `--env`.
# Keep shared defaults duplicated under env.a.vars / env.b.vars.

[env.a]
name = "grok2api-a"

[[env.a.d1_databases]]
binding = "DB"
database_name = "grok2api_a"
database_id = "REPLACE_WITH_D1_DATABASE_ID_A"
migrations_dir = "src/migrations"

[[env.a.kv_namespaces]]
binding = "KV_CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID_A"

[env.a.vars]
# Daily reset at local midnight (default: Asia/Shanghai, UTC+8).
# Make sure the cron below matches this offset.
CACHE_RESET_TZ_OFFSET_MINUTES = "480"

# Build info (CI will inject commit SHA in workflow if needed)
BUILD_SHA = "dev"

# Workers KV has per-value limits; keep <= 25MB.
KV_CACHE_MAX_BYTES = "26214400"

# Batch size for the daily cleanup job (deleting KV keys + D1 rows).
KV_CLEANUP_BATCH = "200"

[env.a.triggers]
# Every day at 00:00 (Asia/Shanghai => 16:00 UTC)
crons = ["0 16 * * *"]

[env.b]
name = "grok2api-b"

[[env.b.d1_databases]]
binding = "DB"
database_name = "grok2api_b"
database_id = "REPLACE_WITH_D1_DATABASE_ID_B"
migrations_dir = "src/migrations"

[[env.b.kv_namespaces]]
binding = "KV_CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID_B"

[env.b.vars]
# Keep same runtime defaults unless you intentionally diverge.
CACHE_RESET_TZ_OFFSET_MINUTES = "480"
BUILD_SHA = "dev"
KV_CACHE_MAX_BYTES = "26214400"
KV_CLEANUP_BATCH = "200"

# Keep B without cron by default to avoid duplicated daily cleanup jobs.
# [env.b.triggers]
# crons = ["0 16 * * *"]
